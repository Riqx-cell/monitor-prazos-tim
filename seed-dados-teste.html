<html lang="pt-BR">

<title>Seed — Monitor de Prazos TIM</title>

  p  { color: #64748b; margin-bottom: 24px; font-size: .9rem; }
  .line { margin: 4px 0; font-size: .85rem; }

  .panel { background: #1e293b; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
  label { display: block; font-size: .8rem; color: #94a3b8; margin-bottom: 6px; }
  input[type=password] { width: 260px; padding: 8px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: .95rem; outline: none; }

  #seed-panel { display: none; }
  .badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: .72rem; font-weight: 800; margin-left: 6px; }
  .b-ATRASADO { background:#fef2f2; color:#dc2626; }
  .b-FATAL    { background:#fff7ed; color:#ea580c; }
  .b-URGENTE  { background:#fff1f2; color:#e11d48; }

<body>
<h2>Seed — Dados de Teste</h2>
<p>Insere 15 processos fictícios cobrindo todos os status, urgências, tipos (Judicial e Administrativo) e funcionalidades.</p>

<!-- Login -->
<div class="panel" id="login-panel">
  <label>Senha do Monitor</label>
  <input type="password" id="s-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/>
  <br>
  <button id="btn-login" onclick="login()">Entrar</button>
  <div class="line err" id="login-err" style="margin-top:10px"></div>
</div>

<!-- Seed -->
<div id="seed-panel">
  <div class="panel">
    <div class="line info">✔ Autenticado. Pronto para inserir os dados de teste.</div>
    <div class="line" style="margin-top:8px;color:#64748b;font-size:.8rem">
      10 Judiciais + 5 Administrativos · todos os status · todas as urgências · alinhaTIM · Sem Ação
    </div>
    <button id="btn" onclick="seed()">Inserir 15 processos de teste</button>
  </div>
  <div id="log"></div>

import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAz0oB4YZEVdABsc5RQskb37ara8kLcO6c",
  authDomain: "monitor-de-prazos.firebaseapp.com",
  projectId: "monitor-de-prazos",
  storageBucket: "monitor-de-prazos.firebasestorage.app",
  messagingSenderId: "271268489971",
  appId: "1:271268489971:web:1abc92f540b9082e41e586",
};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const col  = collection(db, 'prazos');

function log(msg, cls, badges=[]) {
  const d = document.createElement('div');
  d.className = 'line ' + (cls||'');
  d.innerHTML = msg + badges.map(b=>`<span class="badge b-${b}">${b}</span>`).join('');
  document.getElementById('log').appendChild(d);
}

window.login = async function() {
  const btn = document.getElementById('btn-login');
  const pass = document.getElementById('s-pass').value;
  const errEl = document.getElementById('login-err');
  if (!pass) { errEl.textContent = 'Digite a senha.'; return; }
  btn.disabled = true; btn.textContent = 'Entrando…'; errEl.textContent = '';
  try {
    await signInWithEmailAndPassword(auth, 'tfs@monitor.local', pass);
    document.getElementById('login-panel').style.display = 'none';
    document.getElementById('seed-panel').style.display  = 'block';
  } catch(e) {
    errEl.textContent = 'Senha incorreta.';
    btn.disabled = false; btn.textContent = 'Entrar';
  }
};

window.seed = async function() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  log('── Iniciando inserção de 15 processos de teste ──────────────────', 'info');
  log('', '');

  const groups = {
    'Judiciais — Elaborar':      processos.filter(p=>p.tipo==='judicial'&&p.status==='Elaborar'),
    'Judiciais — Enviar TIM':    processos.filter(p=>p.tipo==='judicial'&&p.status==='Enviar TIM'),
    'Judiciais — Ag. Retorno':   processos.filter(p=>p.tipo==='judicial'&&p.status==='Ag. Retorno TIM'),
    'Judiciais — Arquivo':       processos.filter(p=>p.tipo==='judicial'&&(p.status==='PROTOCOLADO'||p.status==='Sem Ação')),
    'Administrativos — Ativos':  processos.filter(p=>p.tipo==='administrativo'&&p.status!=='PROTOCOLADO'),
    'Administrativos — Arquivo': processos.filter(p=>p.tipo==='administrativo'&&p.status==='PROTOCOLADO'),
  };

  let total = 0, erros = 0;

  for (const [grupo, lista] of Object.entries(groups)) {
    if(!lista.length) continue;
    log(`── ${grupo} (${lista.length}) ──────────────────────────────────`, 'sep');
    for (const p of lista) {
      try {
        const { _urg, _tipo, ...data } = p;
        await addDoc(col, { ...data, createdAt: serverTimestamp() });
        log(`✔ ${p.caso} · ${p.org} · Fatal: ${p.fatal||'S/P'}`, 'ok', [_tipo, _urg]);
        total++;
      } catch(e) {
        log(`✘ ${p.caso} — ${e.message}`, 'err');
        erros++;
      }
    }
    log('', '');
  }

  log(`── Concluído: ${total} inseridos, ${erros} erros ─────────────────────`, erros>0?'err':'info');
  btn.textContent = 'Concluído!';
};
</script>
